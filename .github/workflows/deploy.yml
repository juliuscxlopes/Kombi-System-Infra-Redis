name: Docker Build and Push (Redis)

on:
  push:
    branches: [ "main" ]
    # 🎯 FILTRO: Qualquer alteração de arquivo neste repositório dispara o build
    paths:
      - '**'
      - '!README.md' # Ignora apenas alterações no README para poupar build

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          # ✅ Como a raiz do repo já é a pasta do Redis, o contexto é ponto (.)
          context: . 
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.actor }}/kombi-infra-redis-manager:latest