services:
  # O Servidor Redis oficial (Banco de dados)
  kombi-redis-server:
    image: redis:7-alpine
    container_name: redis-msg-center
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - kombi-network
    restart: always
    ports:
      - "6380:6379"

  # O seu Gerenciador
  kombi-redis-manager:
    image: ghcr.io/juliuscxlopes/kombi-redis-manager:latest
    container_name: redis-manager
    depends_on:
      - kombi-redis-server
    environment:
      - REDIS_HOST=redis-msg-center  # <<< AJUSTADO PARA O NOME DO CONTAINER
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - kombi-network
    restart: on-failure